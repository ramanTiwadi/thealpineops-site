<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var repoBase = "/thealpineops-site/";
        var isGithubPagesRepoHost =
          window.location.hostname.endsWith(".github.io");
        var destination = isGithubPagesRepoHost ? repoBase : "/";

        try {
          window.sessionStorage.setItem(
            "spa-redirect-path",
            window.location.pathname +
              window.location.search +
              window.location.hash,
          );
        } catch (error) {
          console.warn("Unable to preserve redirected route.", error);
        }

        window.location.replace(destination);
      })();
    </script>
  </head>
  <body></body>
</html>
